<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="options_page_title">Aria2 下载设置</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hero">
        <p class="eyebrow">Firefox Extension</p>
        <h1 data-i18n="options_hero_title">Aria2 下载设置</h1>
        <p class="lead" data-i18n="options_hero_lead">
          将浏览器下载自动转发给 aria2，并尽量携带当前登录态所需的请求头与 Cookie。
        </p>
      </section>

      <form id="form" class="grid">
        <label>
          <span data-i18n="options_enabled">启用扩展</span>
          <input id="enabled" type="checkbox" />
        </label>
        <label>
          <span data-i18n="options_auto_prompt">自动监听浏览器下载</span>
          <input id="autoPrompt" type="checkbox" />
        </label>
        <label>
          <span data-i18n="options_rpc_protocol">RPC 协议</span>
          <select id="rpcProtocol">
            <option value="ws">ws</option>
            <option value="wss">wss</option>
          </select>
        </label>
        <label>
          <span data-i18n="options_host">主机</span>
          <input id="rpcHost" type="text" />
        </label>
        <label>
          <span data-i18n="options_port">端口</span>
          <input id="rpcPort" type="number" min="1" max="65535" />
        </label>
        <label>
          <span data-i18n="options_path">路径</span>
          <input id="rpcPath" type="text" />
        </label>
        <label>
          <span data-i18n="options_secret">RPC 密钥</span>
          <input id="rpcSecret" type="password" />
        </label>
        <label>
          <span data-i18n="options_download_dir">aria2 下载目录</span>
          <input id="downloadDir" type="text" data-i18n-placeholder="options_download_dir_placeholder" placeholder="可留空" />
        </label>
        <label>
          <span data-i18n="options_user_agent_mode">User-Agent 来源</span>
          <select id="userAgentMode">
            <option value="browser" data-i18n="options_user_agent_browser">使用扩展运行环境 UA</option>
            <option value="captured" data-i18n="options_user_agent_captured">优先使用抓到的请求 UA</option>
          </select>
        </label>
        <label>
          <span data-i18n="options_basic_headers_only">仅基础 Header</span>
          <input id="basicHeadersOnly" type="checkbox" />
        </label>
        <label class="wide">
          <span data-i18n="options_extra_header_names">额外透传 Header 名称</span>
          <textarea id="extraHeaderNames" rows="4" data-i18n-placeholder="options_extra_header_names_placeholder" placeholder="每行一个，或用逗号分隔，例如&#10;x-csrf-token&#10;x-requested-with"></textarea>
        </label>
        <div class="actions">
          <button type="submit" data-i18n="options_save">保存设置</button>
        </div>
      </form>

      <section class="note">
        <h2 data-i18n="options_note_title">说明</h2>
        <p data-i18n="options_note_primary">
          对依赖 Cookie、Referer、Authorization 的站点通常有效；如果目标站额外校验客户端 IP、TLS 指纹或一次性签名，aria2 端仍可能失败。
        </p>
        <p data-i18n="options_note_secondary">
          默认会尽量透传当前请求里的全部安全 header，并过滤 `Host`、`Content-Length`、`Connection`、`Sec-Fetch-*` 等不适合转发的头。开启“仅基础 Header”后，才会退回到常见基础头白名单。
        </p>
      </section>
      <p id="status" class="status"></p>
    </main>
    <script src="i18n.js"></script>
    <script src="options.js"></script>
  </body>
</html>
